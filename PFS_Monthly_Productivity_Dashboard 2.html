function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){return d.toISOString().slice(0,10);}
function isWeekend(d){return d.getDay()===0||d.getDay()===6;}
function getGoal(ds){if(dailyGoalOverrides[ds])return dailyGoalOverrides[ds];const d=new Date(ds);const mk=d.getFullYear()+'_'+(d.getMonth()+1);if(monthlyGoals[mk])return monthlyGoals[mk];return parseInt(document.getElementById('default-goal').value)||60;}
function getMemberGoal(name,ds){const mc=memberConfig.find(m=>m.name===name);if(mc&&mc.goal)return mc.goal;return getGoal(ds);}
function getMonthDays(y,m){const days=[];const d=new Date(y,m-1,1);while(d.getMonth()===m-1){days.push(new Date(d));d.setDate(d.getDate()+1);}return days;}
function getFilteredDays(){const allDays=getMonthDays(currentYear,currentMonth);const from=document.getElementById('range-from').value;const to=document.getElementById('range-to').value;if(!from&&!to)return allDays;return allDays.filter(d=>{const ds=fmtDate(d);if(from&&ds<from)return false;if(to&&ds>to)return false;return true;});}
function getWorkdays(days){return days.filter(d=>!isWeekend(d));}
function colorClass(val,goal){if(val==null)return'';if(val>=goal)return'c-green';if(val>=goal-10)return'c-yellow';return'c-red';}
function calcMemberStats(name,days){const mc=memberConfig.find(m=>m.name===name);const workdays=getWorkdays(days);let met=0,total=0,sum=0,entries=[];workdays.forEach(d=>{const ds=fmtDate(d);const val=productivityData[ds]?productivityData[ds][name]:null;if(val==null)return;total++;sum+=val;const goal=getMemberGoal(name,ds);if(val>=goal)met++;entries.push({date:ds,val,goal});});const rate=total>0?Math.round(met/total*100):null;const avg=total>0?Math.round(sum/total):null;return{name,met,total,rate,avg,sum,entries,isTL:mc&&mc.isTL,exRank:mc&&mc.exRank,exStats:mc&&mc.exStats};}
function getTeamStats(days){return memberConfig.filter(m=>!m.exStats&&!m.isTL).map(m=>calcMemberStats(m.name,days));}
function getRankings(days){const stats=getTeamStats(days).filter(s=>!s.exRank&&s.total>0);const sorted=[...stats].sort((a,b)=>(b.rate||0)-(a.rate||0));const top=sorted.slice(0,3);const bot=[...stats].sort((a,b)=>(a.rate||0)-(b.rate||0)).slice(0,3);return{top,bot};}
function getWeekNum(d){const s=new Date(d.getFullYear(),0,1);return Math.floor(((d-s)+(s.getTimezoneOffset()-d.getTimezoneOffset())*60000)/(7*86400000))+1;}
function getWeekStats(days){const workdays=getWorkdays(days);const weeks={};workdays.forEach(d=>{const ds=fmtDate(d);const wk=getWeekNum(d);if(!weeks[wk])weeks[wk]={label:'Wk '+wk,days:[],met:0,total:0};weeks[wk].days.push(ds);memberConfig.filter(m=>!m.exStats&&!m.isTL).forEach(m=>{const val=productivityData[ds]?productivityData[ds][m.name]:null;if(val==null)return;weeks[wk].total++;if(val>=getMemberGoal(m.name,ds))weeks[wk].met++;});});return Object.values(weeks).map(w=>({...w,rate:w.total>0?Math.round(w.met/w.total*100):null}));}
function getDaySuccessRate(ds){const active=memberConfig.filter(m=>!m.exStats&&!m.isTL);let met=0,total=0;active.forEach(m=>{const val=productivityData[ds]?productivityData[ds][m.name]:null;if(val==null)return;total++;if(val>=getMemberGoal(m.name,ds))met++;});return total>0?Math.round(met/total*100):null;}

  let html=`<div class="two-col" style="margin-bottom:12px"><div class="card"><div class="card-hdr"><span class="ctitle">Goal Settings</span></div><div style="padding:12px"><div class="goal-item" style="margin-bottom:10px"><label>Default Daily Goal</label><input type="number" id="g-default" value="${document.getElementById('default-goal').value}" min="1" onchange="document.getElementById('default-goal').value=this.value;render()"></div><div class="goal-item" style="margin-bottom:10px"><label>${monthName} Override</label><input type="number" id="g-month" value="${monthGoal}" min="1" placeholder="Leave blank for default" onchange="monthlyGoals['${mk}']=this.value?parseInt(this.value):null;render()"></div><div style="font-size:10px;color:var(--g4);margin-top:4px">Per-person goals override month/default. Daily overrides are highest priority.</div></div></div><div class="card"><div class="card-hdr"><span class="ctitle">Daily Goal Override</span></div><div style="padding:12px"><div class="goal-item" style="margin-bottom:8px"><label>Date</label><input type="date" id="g-day-date" style="width:100%;padding:6px 9px;border:1px solid var(--g3);border-radius:5px;font-size:12px;font-family:inherit"></div><div class="goal-item" style="margin-bottom:8px"><label>Goal for that day</label><input type="number" id="g-day-val" min="1" placeholder="e.g. 45"></div><button class="btn primary" style="width:100%" onclick="addDailyOverride()">Set Daily Override</button>${Object.keys(dailyGoalOverrides).length>0?'<div style="margin-top:10px">'+Object.entries(dailyGoalOverrides).sort().map(([d,g])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--g1);border-radius:4px;margin-bottom:3px;font-size:11px"><span>${d}</span><span style="font-weight:700;color:var(--navy)">${g}</span><button class="btn" style="border:none;color:var(--red);background:none;padding:0;font-size:11px;cursor:pointer" onclick="delete dailyGoalOverrides['${d}'];render()">&#10005;</button></div>`).join('')+'</div>':''}</div></div></div>`;
  html+=`<div class="card" style="margin-bottom:12px"><div class="card-hdr"><span class="ctitle">Per-Person Goal Overrides</span></div><div style="padding:12px"><div class="goal-grid">${memberConfig.map(mc=>`<div class="goal-item"><label>${esc(mc.name)}${mc.isTL?' (TL)':''}</label><input type="number" value="${mc.goal||''}" min="1" placeholder="${getMemberGoal(mc.name,fmtDate(new Date()))}" onchange="setPersonGoal('${mc.name}',this.value)"></div>`).join('')}</div></div></div>`;
  html+=`<div class="card"><div class="card-hdr"><span class="ctitle">Member Exclusions</span></div><div style="padding:12px"><div style="font-size:10px;color:var(--g5);margin-bottom:8px">Toggle to exclude members from rankings and/or team statistics. Team Lead is auto-excluded.</div><div class="member-settings">${memberConfig.map(mc=>`<div class="mem-row"><span class="mname">${esc(mc.name)}</span>${mc.isTL?'<span class="tl-tag">TL</span>':''}<div class="toggle-opts"><label><input type="checkbox" ${mc.exRank||mc.isTL?'checked':''} ${mc.isTL?'disabled':''} onchange="toggleExclude('${mc.name}','rank',this.checked)"> Rankings</label><label><input type="checkbox" ${mc.exStats&&!mc.isTL?'checked':''} ${mc.isTL?'disabled':''} onchange="toggleExclude('${mc.name}','stats',this.checked)"> Stats</label><label><input type="checkbox" ${mc.exReport?'checked':''} onchange="toggleExclude('${mc.name}','report',this.checked)"> Reports</label></div></div>`).join('')}</div></div></div>`;
  const mk2=currentYear+'_'+currentMonth;
  html+=`<div class="card"><div class="card-hdr"><span class="ctitle">Month Notes (toggle to include in reports)</span></div><div style="padding:12px"><textarea class="notes-area" id="month-notes" placeholder="Add notes for ${monthName}...">${monthNotes[mk2]||''}</textarea><div style="display:flex;gap:6px;margin-top:8px;align-items:center"><button class="btn primary" onclick="saveNotes()">Save Notes</button><label style="font-size:11px;color:var(--g5);display:flex;align-items:center;gap:4px"><input type="checkbox" id="notes-in-report"> Include in reports</label></div></div></div>`;
  return html;
}

function addDailyOverride(){const d=document.getElementById('g-day-date').value;const v=parseInt(document.getElementById('g-day-val').value);if(!d||!v){alert('Enter both a date and a goal.');return;}dailyGoalOverrides[d]=v;render();}
function setPersonGoal(name,val){const mc=memberConfig.find(m=>m.name===name);if(mc)mc.goal=val?parseInt(val):null;render();}
function toggleExclude(name,type,val){const mc=memberConfig.find(m=>m.name===name);if(!mc)return;if(type==='rank')mc.exRank=val;if(type==='stats')mc.exStats=val;if(type==='report')mc.exReport=val;render();}
function saveNotes(){const mk=currentYear+'_'+currentMonth;monthNotes[mk]=document.getElementById('month-notes').value;alert('Notes saved.');}

function renderReports(){const rpts=[{n:"Full Month Report — All Members",d:"Complete daily breakdown for every member"},{n:"Individual Member Report",d:"Detailed per-member breakdown with daily entries"},{n:"Team Summary Report",d:"High-level overview for meetings"},{n:"Meeting Report (with Notes)",d:"Team summary with space for meeting notes"},{n:"Coaching Report",d:"Members below standard with day-by-day detail"},{n:"Top Performers Report",d:"Top 3 with performance detail"},{n:"MTD Progress Report",d:"Month-to-date snapshot with projections"}];return`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap"><label style="font-size:11px;color:var(--g5);display:flex;align-items:center;gap:4px"><input type="checkbox" id="rpt-notes"> Include month notes</label><label style="font-size:11px;color:var(--g5);display:flex;align-items:center;gap:4px"><input type="checkbox" id="rpt-tl" checked> Include Team Lead row</label><span class="sep"></span><button class="btn dl" onclick="exportAllData()">&#8595; Download All Data</button></div><div class="card"><div class="card-hdr"><span class="ctitle">Available Reports</span></div>${rpts.map((r,i)=>`<div class="rrow"><div><div class="rname">${r.n}</div><div class="rdesc">${r.d}</div></div><button class="btn primary" style="font-size:11px" onclick="printReport(${i})">Print / PDF</button></div>`).join('')}</div><div class="info">Reports open in a new window. Use Ctrl+P to save as PDF or print.</div>`;}

function showAddEntry(){const mOpts=memberConfig.map(m=>`<option value="${esc(m.name)}">${esc(m.name)}</option>`).join('');showModal(`<div class="mhdr"><span class="mt">Add / Edit Daily Entry</span><span class="mx" onclick="closeModal()">&#10005;</span></div><div class="mbody"><div class="field"><label>Date</label><input type="date" id="ae-date"></div><div class="field"><label>Member</label><select id="ae-member">${mOpts}</select></div><div class="field"><label>Accounts Worked</label><input type="number" id="ae-val" min="0" placeholder="e.g. 75"></div></div><div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doAddEntry()">Save</button></div>`);}
function editCell(date,name,current){showModal(`<div class="mhdr"><span class="mt">Edit Entry</span><span class="mx" onclick="closeModal()">&#10005;</span></div><div class="mbody"><div style="font-size:11px;color:var(--g5);margin-bottom:10px">${date} — ${name}</div><div class="field"><label>Accounts Worked</label><input type="number" id="ec-val" value="${current}" min="0"></div><button class="btn" style="font-size:11px;width:100%;margin-top:4px;color:var(--red);border-color:#fca5a5" onclick="deleteEntry('${date}','${name}')">Remove Entry</button></div><div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doEditCell('${date}','${name}')">Save</button></div>`);}
function doAddEntry(){const d=document.getElementById('ae-date').value;const name=document.getElementById('ae-member').value;const val=parseInt(document.getElementById('ae-val').value);if(!d||!name||isNaN(val)){alert('All fields required.');return;}if(!productivityData[d])productivityData[d]={};productivityData[d][name]=val;closeModal();render();}
function doEditCell(date,name){const val=parseInt(document.getElementById('ec-val').value);if(isNaN(val)){alert('Enter a valid number.');return;}if(!productivityData[date])productivityData[date]={};productivityData[date][name]=val;closeModal();render();}
function deleteEntry(date,name){if(!confirm('Remove this entry?'))return;if(productivityData[date])delete productivityData[date][name];closeModal();render();}

function showUploadData(){showModal(`<div class="mhdr"><span class="mt">Upload Productivity Data</span><span class="mx" onclick="closeModal()">&#10005;</span></div><div class="mbody"><div class="dz" id="upd-dz" onclick="document.getElementById('upd-file').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');handleUploadDrop(event)"><input type="file" id="upd-file" accept=".csv,.xlsx,.xls" onchange="processUploadFile(this.files[0])"><div style="font-size:22px;color:var(--g3)">&#8679;</div><div style="font-size:11px;color:var(--g5);margin-top:4px">Click or drag &amp; drop spreadsheet</div></div><div class="info"><strong>Format:</strong> Row 1 = headers. Col A = Date, Col B+ = member names, values = accounts worked.</div><div style="margin-top:6px"><span class="tmpl" onclick="downloadUploadTemplate()">&#8595; Download template</span></div><div id="upd-status" style="margin-top:8px;font-size:11px;color:var(--g5)"></div></div><div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" id="upd-btn" disabled onclick="doUpload()">Import</button></div>`);}
let pendingUpload=null;
function handleUploadDrop(e){const f=e.dataTransfer.files[0];if(f)processUploadFile(f);}
function processUploadFile(file){const status=document.getElementById('upd-status');status.textContent='Reading...';const ext=file.name.split('.').pop().toLowerCase();const reader=new FileReader();reader.onload=e=>{try{let rows=[];if(ext==='csv'){rows=e.target.result.split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));}else{const wb=XLSX.read(e.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false});}let headerRow=null,dataStart=0;for(let i=0;i<Math.min(5,rows.length);i++){if(rows[i]&&String(rows[i][0]).toLowerCase()==='date'){headerRow=i;dataStart=i+1;break;}}if(headerRow==null){status.innerHTML='<span style="color:var(--red)">Could not find header row.</span>';return;}const headers=rows[headerRow];const records=[];for(let i=dataStart;i<rows.length;i++){const row=rows[i];if(!row||!row[0])continue;let dateStr=null;if(row[0] instanceof Date){dateStr=fmtDate(row[0]);}else{const d=new Date(row[0]);if(!isNaN(d))dateStr=fmtDate(d);}if(!dateStr)continue;for(let j=1;j<headers.length;j++){const name=String(headers[j]||'').trim();if(!name||name==='Column1')continue;const val=parseInt(row[j]);if(!isNaN(val)&&val>0)records.push({date:dateStr,name,val});}}pendingUpload=records;const btn=document.getElementById('upd-btn');if(records.length>0){btn.disabled=false;status.innerHTML=`<span style="color:var(--green-mid);font-weight:600">&#10003; ${records.length} entries found</span>`;}else{btn.disabled=true;status.innerHTML='<span style="color:var(--red)">No valid entries found.</span>';}}catch(err){if(document.getElementById('upd-status'))document.getElementById('upd-status').innerHTML=`<span style="color:var(--red)">Error: ${err.message}</span>`;}};if(ext==='csv')reader.readAsText(file);else reader.readAsArrayBuffer(file);}
function doUpload(){if(!pendingUpload)return;let added=0;pendingUpload.forEach(({date,name,val})=>{if(!productivityData[date])productivityData[date]={};const match=memberConfig.find(m=>m.name.toLowerCase().includes(name.toLowerCase().split(' ')[0])||name.toLowerCase().includes(m.name.toLowerCase().split(' ')[0]));const finalName=match?match.name:name;productivityData[date][finalName]=val;added++;});pendingUpload=null;closeModal();alert(`${added} entries imported.`);render();}
function downloadUploadTemplate(){const header='Date,Antwanna,Julie,Lee Ann,Linda,Melody,Rebecca,Reema,Rhonda,Sherazard,Star,Toya,Joy';const rows=[header,'2026-04-01,75,62,,55,,,70,45,,,80,60,'].join('\n');const blob=new Blob([rows],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='Productivity_Upload_Template.csv';a.click();URL.revokeObjectURL(url);}

function exportCalendar(){const days=getFilteredDays();const workdays=getWorkdays(days);const wb=XLSX.utils.book_new();const headerRow=['Member',...workdays.map(d=>fmtDate(d)),'Success Rate','Avg Daily','Total'];const rows=[headerRow];memberConfig.forEach(mc=>{const s=calcMemberStats(mc.name,days);const row=[mc.name+(mc.isTL?' (TL)':'')];workdays.forEach(d=>{const ds=fmtDate(d);row.push(productivityData[ds]?productivityData[ds][mc.name]||'':'');});row.push(s.rate!=null?(s.rate+'%'):'');row.push(s.avg||'');row.push(s.sum||'');rows.push(row);});const mn=new Date(currentYear,currentMonth-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),mn.replace(' ','-'));XLSX.writeFile(wb,`Productivity_${currentYear}_${String(currentMonth).padStart(2,'0')}.xlsx`);}
function exportAllData(){const wb=XLSX.utils.book_new();[1,2,3].forEach(m=>{const year=2026;const days=getMonthDays(year,m);const workdays=getWorkdays(days);const mn=new Date(year,m-1,1).toLocaleDateString('en-US',{month:'short'});const headerRow=['Member',...workdays.map(d=>fmtDate(d)),'Success Rate','Avg','Total'];const rows=[headerRow];memberConfig.forEach(mc=>{const s=calcMemberStats(mc.name,days);const row=[mc.name+(mc.isTL?' (TL)':'')];workdays.forEach(d=>{const ds=fmtDate(d);row.push(productivityData[ds]?productivityData[ds][mc.name]||'':'');});row.push(s.rate!=null?(s.rate+'%'):'');row.push(s.avg||'');row.push(s.sum||'');rows.push(row);});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),mn+' '+year);});XLSX.writeFile(wb,'PFS_Productivity_2026_All_Months.xlsx');}

function printReport(idx){
  const days=getFilteredDays();const monthName=new Date(currentYear,currentMonth-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const dt=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const incNotes=document.getElementById('rpt-notes')&&document.getElementById('rpt-notes').checked;
  const incTL=!document.getElementById('rpt-tl')||document.getElementById('rpt-tl').checked;
  const mk=currentYear+'_'+currentMonth;const noteText=monthNotes[mk]||'';
  const showGoal=parseInt(document.getElementById('default-goal').value)||60;
  const css=`<style>body{font-family:Arial,sans-serif;font-size:11px;color:#222;padding:18px;max-width:1000px;margin:0 auto}h1{color:#0f2544;font-size:16px;margin-bottom:2px}h2{color:#1c3a6b;font-size:13px;margin:12px 0 5px;border-bottom:1px solid #e2e8f0;padding-bottom:2px}p.sub{color:#94a3b8;font-size:9px;margin-bottom:12px}table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10px}th{background:#0f2544;color:#fff;padding:4px 7px;text-align:left}th.r{text-align:right}td{padding:3px 7px;border-bottom:1px solid #e2e8f0}td.r{text-align:right;font-family:monospace}tr:nth-child(even) td{background:#f8f9fb}.g{background:#dcfce7;color:#166534;font-weight:700}.y{background:#fef9c3;color:#854d0e;font-weight:700}.r{background:#fee2e2;color:#991b1b;font-weight:700}.tl{color:#94a3b8;font-style:italic}.note{background:#fdf6e3;border:1px solid #e8c84a;border-radius:4px;padding:8px 10px;font-size:10px;color:#7a5c00;margin:10px 0}.footer{margin-top:14px;border-top:1px solid #e2e8f0;padding-top:7px;font-size:9px;color:#94a3b8}.rank-box{display:inline-block;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:6px 12px;margin:3px;text-align:center;min-width:100px}.rank-box .rname{font-weight:700;color:#0f2544;font-size:11px}.rank-box .rrate{font-size:16px;font-weight:700;color:#16a34a}@media print{body{padding:8px}}</style>`;
  const hdr=`<h1>PFS Credit Resolution — Refund Team &bull; UF Health Shands</h1><p class="sub">Generated: ${dt} &bull; Period: ${monthName} &bull; Daily Goal: ${showGoal} accounts</p>`;
  const notesBlock=incNotes&&noteText?`<div class="note"><strong>Notes:</strong> ${noteText}</div>`:'';
  const titles=["Full Month Report","Individual Member Report","Team Summary","Meeting Report","Coaching Report","Top Performers","MTD Progress Report"];
  let body=`<h2>${titles[idx]}</h2>${notesBlock}`;
  const{top,bot}=getRankings(days);
  const allStats=memberConfig.map(mc=>calcMemberStats(mc.name,days)).filter(s=>incTL||!s.isTL);
  const teamStats=allStats.filter(s=>!s.exStats&&!s.isTL);
  let teamMet=0,teamTotal=0;teamStats.forEach(s=>{teamMet+=s.met;teamTotal+=s.total;});
  const teamRate=teamTotal>0?Math.round(teamMet/teamTotal*100):null;
  const workdays=getWorkdays(days);
  if(idx===0){body+=`<table><thead><tr><th>Member</th>${workdays.map(d=>`<th style="text-align:center;min-width:22px">${new Date(d.getTime()+(12*3600000)).toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}</th>`).join('')}<th class="r">Met</th><th class="r">Total</th><th class="r">Rate</th><th class="r">Avg</th></tr></thead><tbody>`;allStats.forEach(s=>{if(s.exReport)return;body+=`<tr><td class="${s.isTL?'tl':''}" style="font-weight:600">${s.name}${s.isTL?' (TL)':''}</td>`;workdays.forEach(d=>{const ds=fmtDate(d);const val=productivityData[ds]?productivityData[ds][s.name]:null;if(val==null){body+=`<td style="text-align:center;color:#ccc">—</td>`;return;}const goal=getMemberGoal(s.name,ds);const cls=s.isTL?'tl':val>=goal?'g':val>=goal-10?'y':'r';body+=`<td class="${cls}" style="text-align:center">${val}</td>`;});body+=`<td class="r">${s.met}</td><td class="r">${s.total}</td><td class="r ${s.isTL?'tl':s.rate>=70?'g':s.rate>=50?'y':'r'}">${pct(s.rate)}</td><td class="r">${s.avg||'—'}</td></tr>`;});body+='</tbody></table>';}
  else if(idx===1){allStats.filter(s=>!s.exReport).forEach(s=>{body+=`<h2>${s.name}${s.isTL?' (TL)':''} — ${pct(s.rate)} success &bull; ${s.met}/${s.total} days &bull; Avg: ${s.avg||'—'}</h2>`;if(!s.entries.length){body+='<p style="color:#94a3b8">No entries</p>';return;}body+=`<table><thead><tr><th>Date</th><th class="r">Accounts</th><th class="r">Goal</th><th class="r">Status</th><th class="r">vs Goal</th></tr></thead><tbody>`;s.entries.forEach((e,i)=>{const diff=e.val-e.goal;const cls=s.isTL?'tl':e.val>=e.goal?'g':e.val>=e.goal-10?'y':'r';const dow=new Date(e.date+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});body+=`<tr><td>${dow}</td><td class="r ${cls}">${e.val}</td><td class="r">${e.goal}</td><td class="r">${s.isTL?'TL':e.val>=e.goal?'Met':e.val>=e.goal-10?'Close':'Below'}</td><td class="r" style="color:${diff>=0?'#16a34a':'#dc2626'}">${diff>=0?'+':''}${diff}</td></tr>`;});body+='</tbody></table>';});}
  else if(idx===2||idx===3){body+=`<table><thead><tr><th>Member</th><th class="r">Met</th><th class="r">Worked</th><th class="r">Rate</th><th class="r">Avg</th><th class="r">Total</th></tr></thead><tbody>`;allStats.filter(s=>!s.exReport).forEach(s=>{const cls=s.isTL?'tl':s.rate>=70?'g':s.rate>=50?'y':'r';body+=`<tr><td class="${s.isTL?'tl':''}" style="font-weight:600">${s.name}${s.isTL?' (TL)':''}</td><td class="r">${s.met||'—'}</td><td class="r">${s.total||'—'}</td><td class="r ${cls}">${pct(s.rate)}</td><td class="r">${s.avg||'—'}</td><td class="r">${s.sum||'—'}</td></tr>`;});body+=`</tbody></table><div style="margin-bottom:10px"><strong>Team MTD Rate: </strong><span style="font-size:14px;font-weight:700;color:${teamRate>=70?'#16a34a':teamRate>=50?'#d97706':'#dc2626'}">${pct(teamRate)}</span></div><h2>Top Performers</h2><div style="margin-bottom:10px">${top.map((s,i)=>`<div class="rank-box"><div class="rname">#${i+1} ${s.name}</div><div class="rrate">${pct(s.rate)}</div></div>`).join('')}</div>`;if(idx===3){body+=`<h2>Meeting Notes</h2><div style="border:1px solid #e2e8f0;border-radius:4px;padding:12px;min-height:80px;color:#94a3b8;font-style:italic">${noteText||'[Add meeting notes here]'}</div>`;}}
  else if(idx===4){const coaching=allStats.filter(s=>!s.isTL&&!s.exReport&&s.rate!=null&&s.rate<70).sort((a,b)=>a.rate-b.rate);if(!coaching.length){body+='<p style="color:#94a3b8">All members on track.</p>';}else{coaching.forEach(s=>{body+=`<h2>${s.name} — ${pct(s.rate)} (${s.met}/${s.total} days)</h2>`;const below=s.entries.filter(e=>e.val<e.goal);body+=`<table><thead><tr><th>Date</th><th class="r">Accounts</th><th class="r">Goal</th><th class="r">Shortfall</th></tr></thead><tbody>`;below.forEach(e=>{const dow=new Date(e.date+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});body+=`<tr><td>${dow}</td><td class="r r">${e.val}</td><td class="r">${e.goal}</td><td class="r" style="color:#dc2626">${e.val-e.goal}</td></tr>`;});body+='</tbody></table>';});}}
  else if(idx===5){top.forEach((s,i)=>{body+=`<div class="rank-box"><div class="rname">#${i+1} ${s.name}</div><div class="rrate">${pct(s.rate)}</div><div style="font-size:9px;color:#64748b">${s.met}/${s.total} days &bull; avg ${s.avg}</div></div>`;});body+='<br><br>';top.forEach(s=>{body+=`<h2>${s.name} — Detail</h2><table><thead><tr><th>Date</th><th class="r">Accounts</th><th class="r">Goal</th><th class="r">vs Goal</th></tr></thead><tbody>`;s.entries.forEach(e=>{const diff=e.val-e.goal;const dow=new Date(e.date+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});body+=`<tr><td>${dow}</td><td class="r g">${e.val}</td><td class="r">${e.goal}</td><td class="r" style="color:#16a34a">+${diff>0?diff:0}</td></tr>`;});body+='</tbody></table>';});}
  else if(idx===6){const today=new Date();const monthEnd=new Date(currentYear,currentMonth,0);const daysLeft=Math.max(0,Math.ceil((monthEnd-today)/86400000));const workdaysLeft=Array.from({length:daysLeft},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()+i+1);return d;}).filter(d=>!isWeekend(d)).length;body+=`<table><thead><tr><th>Member</th><th class="r">Rate</th><th class="r">Avg</th><th class="r">Total MTD</th><th class="r">Projected</th><th class="r">On Track?</th></tr></thead><tbody>`;allStats.filter(s=>!s.exReport).forEach(s=>{const proj=s.avg&&workdaysLeft?s.sum+s.avg*workdaysLeft:null;const ot=s.rate!=null?s.rate>=60?'Yes':'No':'—';const cls=s.isTL?'tl':ot==='Yes'?'g':ot==='No'?'r':'';body+=`<tr><td class="${s.isTL?'tl':''}" style="font-weight:600">${s.name}${s.isTL?' (TL)':''}</td><td class="r ${s.isTL?'tl':''}">${pct(s.rate)}</td><td class="r">${s.avg||'—'}</td><td class="r">${s.sum||'—'}</td><td class="r">${proj?Math.round(proj).toLocaleString():'—'}</td><td class="r ${cls}">${s.isTL?'TL':ot}</td></tr>`;});body+=`</tbody></table><p style="color:#64748b;font-size:10px;margin-top:6px">Est. ${workdaysLeft} workdays remaining.</p>`;}
  body+=`<div class="footer">A Joy Watford Design &bull; PFS Credit Resolution Dept (Refund Team) &bull; UF Health Shands</div>`;
  const win=window.open('','_blank','width=1020,height=720');win.document.write(`<html><head>${css}<style>@media print{.no-print{display:none!important}}</style></head><body><div class=\"no-print\" style=\"position:sticky;top:0;z-index:99;background:#0f2544;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:3px solid #c9a227\"><span style=\"color:rgba(255,255,255,.6);font-size:11px\">Review report before printing</span><button onclick=\"window.print()\" style=\"background:#c9a227;color:#0f2544;border:none;padding:7px 20px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif\">&#128438;&nbsp; Print / Save as PDF</button></div>${hdr}${body}</body></html>`);win.document.close();win.focus();
}

function showModal(html){closeModal();const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-bg';bg.innerHTML=`<div class="modal">${html}</div>`;bg.onclick=e=>{if(e.target===bg)closeModal();};document.body.appendChild(bg);}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove();}

function render(){const b=document.getElementById('main-body');if(!b)return;switch(currentTab){case 'dashboard':b.innerHTML=renderDashboard();break;case 'daily':b.innerHTML=renderDaily();break;case 'member':b.innerHTML=renderMember();break;case 'goals':b.innerHTML=renderGoals();break;case 'reports':b.innerHTML=renderReports();break;}}
render();

const _NOW=new Date();document.getElementById('hdr-date').innerHTML=_NOW.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'long',day:'numeric'})+'<br>'+_NOW.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

let lastUpdatedStamp = null;

function setLastUpdated(name){
  lastUpdatedStamp = {name, time: new Date()};
  const el = document.getElementById('last-updated');
  if(el) el.innerHTML = 'Last updated by <strong style="color:rgba(255,255,255,.6)">' + name + '</strong> &bull; ' + lastUpdatedStamp.time.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' at ' + lastUpdatedStamp.time.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function saveSnapshot(){
  showModal(`<div class="mhdr"><span class="mt">&#8681; Save &amp; Share</span><span class="mx" onclick="closeModal()">&#10005;</span></div>
  <div class="mbody">
    <div style="font-size:12px;color:var(--g5);margin-bottom:12px;line-height:1.6">This will stamp your name and the current date/time into the file, then download it. Upload the downloaded file to Teams to replace the old version — your manager will see your updates when they open it.</div>
    <div class="field"><label>Your Name</label><input type="text" id="snap-name" placeholder="e.g. Joy Watford" value="${lastUpdatedStamp?lastUpdatedStamp.name:''}"></div>
    <div class="info" style="margin-top:0">After downloading, go to Teams &rarr; Files tab &rarr; upload and replace the existing file.</div>
  </div>
  <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn dl" onclick="doSaveSnapshot()">&#8681; Download Updated File</button></div>`);
}

function doSaveSnapshot(){
  const name = (document.getElementById('snap-name').value||'').trim();
  if(!name){alert('Please enter your name.');return;}
  setLastUpdated(name);
  closeModal();

  // Serialize all current data into the HTML and trigger download
  const stamp = lastUpdatedStamp.time.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+lastUpdatedStamp.time.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  // Build a data payload to embed
  const payload = {
    productivityData,
    monthlyGoals,
    dailyGoalOverrides,
    monthNotes,
    memberConfig: memberConfig.map(m=>({...m})),
    lastUpdatedBy: name,
    lastUpdatedAt: lastUpdatedStamp.time.toISOString()
  };

  // Get current HTML and inject the saved data
  const currentHTML = document.documentElement.outerHTML;
  const injection = `\n// SAVED DATA SNAPSHOT — ${stamp} by ${name}\nconst _SAVED_DATA = ${JSON.stringify(payload)};\nif(_SAVED_DATA){Object.assign(productivityData,_SAVED_DATA.productivityData);Object.assign(monthlyGoals,_SAVED_DATA.monthlyGoals);Object.assign(dailyGoalOverrides,_SAVED_DATA.dailyGoalOverrides);Object.assign(monthNotes,_SAVED_DATA.monthNotes);if(_SAVED_DATA.memberConfig)memberConfig.splice(0,memberConfig.length,..._SAVED_DATA.memberConfig);if(_SAVED_DATA.lastUpdatedBy){lastUpdatedStamp={name:_SAVED_DATA.lastUpdatedBy,time:new Date(_SAVED_DATA.lastUpdatedAt)};const el=document.getElementById('last-updated');if(el)el.innerHTML='Last updated by <strong style=\\"color:rgba(255,255,255,.6)\\">'+ _SAVED_DATA.lastUpdatedBy+'</strong> &bull; '+new Date(_SAVED_DATA.lastUpdatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+new Date(_SAVED_DATA.lastUpdatedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}}\n`;

  const updatedHTML = currentHTML.replace('seedData();\n', 'seedData();\n' + injection);

  const blob = new Blob([updatedHTML], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'PFS_Monthly_Productivity_Dashboard.html';
  a.click();
  URL.revokeObjectURL(url);
}

</script>
